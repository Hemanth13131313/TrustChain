name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    # Go setup for backend services
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: latest
        working-directory: services/ingestion
        
    - name: Go Unit Tests
      run: |
        for dir in services/*; do
          if [ -f "$dir/go.mod" ]; then
            cd "$dir"
            go test ./...
            cd ../..
          fi
        done

    # Node.js setup for frontend
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: web/dashboard/package-lock.json

    - name: Frontend Lint & Test
      working-directory: web/dashboard
      run: |
        npm install
        npm run lint --if-present
        npm test --if-present

    # OPA setup for Rego policies
    - name: Set up OPA
      uses: open-policy-agent/setup-opa@v2
      with:
        version: latest

    - name: OPA Policy Tests
      run: opa test policies/

  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: commitlint
        uses: wagoid/commitlint-github-action@v5

name: TRUSTCHAIN Secure Build

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
        description: "The name of the container image to build (e.g. ghcr.io/my-org/my-app)"
      image_tag:
        required: false
        type: string
        default: ${{ github.sha }}
        description: "The tag for the container image"
      trustchain_url:
        required: true
        type: string
        description: "The URL of the TRUSTCHAIN Ingestion Service"
    secrets:
      registry_username:
        required: true
      registry_password:
        required: true
      trustchain_token:
        required: true

permissions:
  contents: read
  packages: write
  id-token: write # Required for Sigstore keyless signing

jobs:
  build-sign-attest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io # Configurable based on inputs
          username: ${{ secrets.registry_username }}
          password: ${{ secrets.registry_password }}

      - name: Build and Push Image
        id: build
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ inputs.image_name }}:${{ inputs.image_tag }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.4.0

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: |
          syft packages ${{ inputs.image_name }}:${{ inputs.image_tag }} -o cyclonedx-json=sbom.cdx.json

      - name: Sign Image (Keyless)
        run: |
          cosign sign --yes ${{ inputs.image_name }}@${{ steps.build.outputs.digest }}

      - name: Generate SLSA Provenance
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v1.9.0
        with:
          image: ${{ inputs.image_name }}
          digest: ${{ steps.build.outputs.digest }}
          registry-username: ${{ secrets.registry_username }}
          registry-password: ${{ secrets.registry_password }}

      - name: Upload Artifacts to TRUSTCHAIN
        run: |
          # Upload SBOM
          curl -X POST "${{ inputs.trustchain_url }}/api/v1/ingest/sbom" \
            -H "Authorization: Bearer ${{ secrets.trustchain_token }}" \
            -H "Content-Type: application/json" \
            -d @sbom.cdx.json
          
          # Real implementation would also parse and upload the SLSA provenance .intoto.jsonl generated above

# TRUSTCHAIN Secure Build - GitLab CI Template
# Include this template in your .gitlab-ci.yml

variables:
  DOCKER_DRIVER: overlay2
  COSIGN_YES: "true"

stages:
  - build
  - security
  - push

trustchain_build_and_sign:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  id_tokens:
    SIGSTORE_ID_TOKEN: # OIDC integration for keyless signing
      aud: sigstore
  script:
    - apk add --no-cache curl
    
    # Install Syft
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
    
    # Install Cosign
    - wget "https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64" -O /usr/local/bin/cosign
    - chmod +x /usr/local/bin/cosign

    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    
    # Get digest
    - IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA)
    
    # Generate SBOM
    - syft $IMAGE_DIGEST -o cyclonedx-json=sbom.cdx.json
    
    # Sign Image
    - cosign sign $IMAGE_DIGEST
    
    # Upload to TRUSTCHAIN
    - |
      curl -X POST "$TRUSTCHAIN_URL/api/v1/ingest/sbom" \
        -H "Authorization: Bearer $TRUSTCHAIN_TOKEN" \
        -H "Content-Type: application/json" \
        -d @sbom.cdx.json

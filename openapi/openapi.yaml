openapi: 3.1.0
info:
  title: TRUSTCHAIN API
  description: API Gateway for TRUSTCHAIN continuous supply chain verification
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /artifacts/{digest}/verification:
    get:
      summary: Get verification status of an artifact
      parameters:
        - in: path
          name: digest
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationResult'
components:
  schemas:
    VerificationResult:
      type: object
      properties:
        verified:
          type: boolean
        slsaLevel:
          type: integer
        signaturesCount:
          type: integer
        reason:
          type: string
